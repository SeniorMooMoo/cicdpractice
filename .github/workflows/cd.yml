name: CD

# Runs automatically after a merge (push) to main.
# In a real project, replace the deploy step with your actual deployment
# command (e.g., AWS ECS, Heroku, Fly.io, Docker Hub push, etc.).
on:
  push:
    branches:
      - main

jobs:
  # ── 1. Build & verify ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build check
        run: npm run build

  # ── 2. Deploy to staging ───────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging        # requires "staging" environment to exist in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to staging
        run: |
          echo "Deploying to STAGING environment..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          # TODO: Replace with your real deployment command, e.g.:
          # npx fly deploy --app myapp-staging
          # aws ecs update-service --cluster staging --service myapp ...

  # ── 3. Deploy to production (requires manual approval) ────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production     # requires "production" environment with a required reviewer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION environment..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          # TODO: Replace with your real deployment command, e.g.:
          # npx fly deploy --app myapp-prod
          # aws ecs update-service --cluster prod --service myapp ...
